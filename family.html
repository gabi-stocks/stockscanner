<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>רשימת קניות משפחתית</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      direction: rtl; text-align: right;
    }

    /* ── LOGIN ── */
    #login-screen {
      background: white; border-radius: 20px; padding: 44px 36px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; width: 360px;
    }
    .login-emoji { font-size: 3rem; margin-bottom: 10px; }
    #login-screen h1 { font-size: 1.9rem; margin-bottom: 6px; color: #333; }
    #login-screen > p { color: #888; margin-bottom: 24px; font-size: 0.9rem; }

    .member-label { font-size: 0.85rem; color: #666; margin-bottom: 10px; font-weight: 600; }
    .member-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px;
    }
    .member-btn {
      padding: 10px 6px; border: 2px solid #e0e0e0; border-radius: 12px;
      background: white; cursor: pointer; font-size: 0.9rem; color: #555;
      transition: all 0.18s; font-weight: 500;
    }
    .member-btn:hover  { border-color: #667eea; color: #667eea; }
    .member-btn.active {
      border-color: #667eea; background: linear-gradient(135deg,#667eea,#764ba2);
      color: white; box-shadow: 0 3px 10px rgba(102,126,234,0.35);
    }

    #login-screen input[type=password] {
      width: 100%; padding: 13px 18px; border: 2px solid #e0e0e0; border-radius: 12px;
      font-size: 1rem; outline: none; text-align: center; direction: ltr;
      letter-spacing: 3px; transition: border-color 0.2s;
    }
    #login-screen input[type=password]:focus { border-color: #667eea; }

    #login-btn {
      width: 100%; margin-top: 14px; padding: 13px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white; border: none; border-radius: 12px;
      font-size: 1rem; font-weight: 600; cursor: pointer;
    }
    #login-btn:hover { opacity: 0.9; }
    #login-error { color: #e74c3c; margin-top: 10px; font-size: 0.88rem; min-height: 18px; }

    /* ── APP ── */
    #app { display: none; width: 100%; max-width: 720px; padding: 20px; }

    .header {
      background: white; border-radius: 20px; padding: 22px 26px; margin-bottom: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.13);
      display: flex; justify-content: space-between; align-items: center;
    }
    .header h1 { font-size: 1.4rem; color: #333; }
    .header p  { color: #888; font-size: 0.82rem; margin-top: 3px; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .user-badge {
      padding: 6px 14px; background: linear-gradient(135deg,#667eea,#764ba2);
      color: white; border-radius: 20px; font-size: 0.82rem; font-weight: 600;
    }
    #logout-btn {
      padding: 7px 14px; background: #f0f0f0; border: none;
      border-radius: 10px; cursor: pointer; font-size: 0.82rem; color: #666;
    }
    #logout-btn:hover { background: #e0e0e0; }

    .card {
      background: white; border-radius: 20px; padding: 22px 26px;
      margin-bottom: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    .card h2 { color: #555; font-size: 0.95rem; margin-bottom: 14px; font-weight: 600; }
    .card h2.big { color: #333; font-size: 1.15rem; margin-bottom: 18px; }

    /* ── WEEK ── */
    .days-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .day-box {
      background: #f7f8fc; border-radius: 13px; padding: 11px 6px;
      text-align: center; border: 2px solid transparent;
    }
    .day-box.today {
      background: linear-gradient(135deg, #667eea, #764ba2);
      box-shadow: 0 4px 14px rgba(102,126,234,0.38);
    }
    .day-name  { font-size: 0.75rem; font-weight: 700; color: #888; }
    .day-date  { font-size: 1.05rem; font-weight: 700; color: #333; margin-top: 3px; }
    .day-month { font-size: 0.68rem; color: #aaa; margin-top: 2px; }
    .day-box.today .day-name,
    .day-box.today .day-date,
    .day-box.today .day-month { color: white; }

    /* ── QUICK ITEMS ── */
    .quick-section { margin-bottom: 18px; }
    .quick-section h3 { font-size: 0.82rem; color: #999; margin-bottom: 10px; font-weight: 600; }
    .quick-chips { display: flex; flex-wrap: wrap; gap: 7px; }
    .quick-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 12px; background: #f0f2ff; border: 1.5px solid #d0d8ff;
      border-radius: 20px; font-size: 0.85rem; color: #555; cursor: pointer;
      transition: all 0.15s;
    }
    .quick-chip:hover { background: #e0e5ff; border-color: #667eea; color: #333; }
    .quick-chip .chip-name { flex: 1; }
    .quick-chip .chip-del {
      font-size: 0.75rem; color: #bbb; cursor: pointer; padding: 0 2px;
      border-radius: 50%; transition: color 0.15s;
      background: none; border: none; line-height: 1;
    }
    .quick-chip .chip-del:hover { color: #e74c3c; }
    .quick-empty { color: #ccc; font-size: 0.82rem; }

    /* ── ADD FORM ── */
    .add-form { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .add-form input {
      flex: 1; min-width: 110px; padding: 11px 14px;
      border: 2px solid #e0e0e0; border-radius: 12px;
      font-size: 0.92rem; outline: none;
      text-align: right; direction: rtl; transition: border-color 0.2s;
    }
    .add-form input:focus { border-color: #667eea; }
    .add-form input::placeholder { color: #bbb; }

    #add-btn {
      padding: 11px 20px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white; border: none; border-radius: 12px;
      font-size: 0.92rem; font-weight: 600; cursor: pointer; white-space: nowrap;
    }
    #add-btn:hover { opacity: 0.9; }
    #add-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── LIST ── */
    #shopping-list { list-style: none; }
    .list-empty { text-align: center; padding: 36px 20px; color: #ccc; font-size: 0.95rem; }
    .list-empty span { font-size: 2.2rem; display: block; margin-bottom: 8px; }

    .list-item {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 14px; border-radius: 13px; margin-bottom: 7px;
      background: #fafafa; border: 2px solid transparent;
      transition: all 0.2s; animation: slideIn 0.22s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-7px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .list-item:hover { border-color: #e8ecff; background: #f4f6ff; }
    .list-item.done  { opacity: 0.48; }
    .list-item.done .item-name { text-decoration: line-through; color: #aaa; }

    .check-btn {
      width: 26px; height: 26px; min-width: 26px;
      border-radius: 50%; border: 2.5px solid #667eea;
      background: white; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; color: white; transition: all 0.2s;
    }
    .list-item.done .check-btn { background: #667eea; border-color: #667eea; }

    .item-info { flex: 1; }
    .item-name { font-size: 0.97rem; color: #333; font-weight: 500; }
    .item-who  { font-size: 0.76rem; color: #999; margin-top: 2px; }

    .delete-btn {
      padding: 5px 10px; background: none; border: none;
      color: #ddd; font-size: 1rem; cursor: pointer; border-radius: 7px;
      transition: all 0.2s;
    }
    .delete-btn:hover { background: #fff0f0; color: #e74c3c; }

    .list-footer {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 14px; padding-top: 14px; border-top: 1px solid #f0f0f0;
    }
    .list-footer span { color: #aaa; font-size: 0.82rem; }
    #clear-done-btn {
      padding: 7px 13px; background: none; border: 1px solid #e0e0e0;
      border-radius: 9px; color: #999; font-size: 0.79rem; cursor: pointer;
      transition: all 0.2s;
    }
    #clear-done-btn:hover { background: #fff0f0; border-color: #e74c3c; color: #e74c3c; }

    .sync-dot {
      display: inline-block; width: 7px; height: 7px;
      border-radius: 50%; background: #ccc; margin-right: 5px;
      vertical-align: middle; transition: background 0.3s;
    }
    .sync-dot.on { background: #2ecc71; }

    @media (max-width: 480px) {
      .days-grid { gap: 5px; }
      .day-box { padding: 9px 3px; }
      .day-name { font-size: 0.68rem; }
      .day-date { font-size: 0.9rem; }
      .member-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-emoji">🏠</div>
  <h1>שלום משפחה!</h1>
  <p>בחר את שמך והכנס סיסמה</p>

  <div class="member-label">מי אתה?</div>
  <div class="member-grid">
    <button class="member-btn" onclick="selectMember(this,'אלון')">אלון</button>
    <button class="member-btn" onclick="selectMember(this,'נדב')">נדב</button>
    <button class="member-btn" onclick="selectMember(this,'נטע')">נטע</button>
    <button class="member-btn" onclick="selectMember(this,'ענבל')">ענבל</button>
    <button class="member-btn" onclick="selectMember(this,'גבי')">גבי</button>
  </div>

  <input type="password" id="password-input" placeholder="סיסמה" autocomplete="current-password">
  <button id="login-btn" onclick="login()">כניסה</button>
  <div id="login-error"></div>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <div>
      <h1>🛒 רשימת קניות <span class="sync-dot" id="sync-dot"></span></h1>
      <p id="week-label"></p>
    </div>
    <div class="header-right">
      <div class="user-badge" id="user-badge"></div>
      <button id="logout-btn" onclick="logout()">יציאה</button>
    </div>
  </div>

  <!-- Week -->
  <div class="card">
    <h2>📅 ימי השבוע</h2>
    <div class="days-grid" id="days-grid"></div>
  </div>

  <!-- Shopping -->
  <div class="card">
    <h2 class="big">📝 רשימת קניות</h2>

    <!-- Quick items -->
    <div class="quick-section">
      <h3>⚡ מוצרים מהירים — לחץ להוספה</h3>
      <div class="quick-chips" id="quick-chips"></div>
    </div>

    <!-- Add form -->
    <div class="add-form">
      <input type="text" id="item-input" placeholder="מוצר חדש..." maxlength="80">
      <button id="add-btn" onclick="addItem()">+ הוסף</button>
    </div>

    <ul id="shopping-list"></ul>

    <div class="list-footer">
      <span id="list-count"></span>
      <button id="clear-done-btn" onclick="clearDone()">מחק שנקנו ✓</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import {
    getFirestore, collection, addDoc, onSnapshot,
    doc, updateDoc, deleteDoc, query, orderBy, writeBatch, getDocs
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyAXw1rOkCevupn2Qp4Gw0GNr0gq-tCtFgQ",
    authDomain:        "familyshoppinglist-2c297.firebaseapp.com",
    projectId:         "familyshoppinglist-2c297",
    storageBucket:     "familyshoppinglist-2c297.firebasestorage.app",
    messagingSenderId: "489889558417",
    appId:             "1:489889558417:web:c9d9551699eeaf10bdb430",
    measurementId:     "G-6CLWZTE2EG"
  };

  const app      = initializeApp(firebaseConfig);
  const db       = getFirestore(app);
  const itemsCol = collection(db, "shoppingItems");
  const quickCol = collection(db, "quickItems");

  const PASSWORD = "dori";
  const MEMBERS  = ["אלון","נדב","נטע","ענבל","גבי"];

  const HEBREW_DAYS   = ["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];
  const HEBREW_MONTHS = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני",
                          "יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];

  let currentUser = "";
  let selectedMember = "";
  let currentItems = [];

  // ── Member selection ──────────────────────────────────────
  window.selectMember = function(btn, name) {
    document.querySelectorAll(".member-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    selectedMember = name;
    document.getElementById("login-error").textContent = "";
  };

  // ── Auth ─────────────────────────────────────────────────
  window.login = function() {
    if (!selectedMember) {
      document.getElementById("login-error").textContent = "אנא בחר את שמך תחילה";
      return;
    }
    const val = document.getElementById("password-input").value;
    if (val === PASSWORD) {
      currentUser = selectedMember;
      sessionStorage.setItem("family_auth", "1");
      sessionStorage.setItem("family_user", currentUser);
      showApp();
    } else {
      document.getElementById("login-error").textContent = "סיסמה שגויה, נסה שוב";
      document.getElementById("password-input").value = "";
      document.getElementById("password-input").focus();
    }
  };

  window.logout = function() {
    sessionStorage.removeItem("family_auth");
    sessionStorage.removeItem("family_user");
    currentUser = ""; selectedMember = "";
    document.getElementById("app").style.display = "none";
    document.getElementById("login-screen").style.display = "block";
    document.getElementById("password-input").value = "";
    document.getElementById("login-error").textContent = "";
    document.querySelectorAll(".member-btn").forEach(b => b.classList.remove("active"));
    if (window._unsub1) window._unsub1();
    if (window._unsub2) window._unsub2();
  };

  document.getElementById("password-input")
    .addEventListener("keydown", e => { if (e.key === "Enter") window.login(); });

  // Auto-login
  if (sessionStorage.getItem("family_auth") === "1") {
    currentUser = sessionStorage.getItem("family_user") || "";
    showApp();
  }

  function showApp() {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("user-badge").textContent = "👤 " + currentUser;
    init();
  }

  // ── Week ─────────────────────────────────────────────────
  function renderWeek() {
    const today  = new Date();
    const sunday = new Date(today);
    sunday.setDate(today.getDate() - today.getDay());
    const days = [];
    for (let i = 0; i <= 4; i++) {
      const d = new Date(sunday);
      d.setDate(sunday.getDate() + i);
      days.push(d);
    }
    document.getElementById("week-label").textContent =
      `שבוע ${days[0].getDate()} ${HEBREW_MONTHS[days[0].getMonth()]} – ${days[4].getDate()} ${HEBREW_MONTHS[days[4].getMonth()]} ${days[4].getFullYear()}`;
    const grid = document.getElementById("days-grid");
    grid.innerHTML = "";
    days.forEach(d => {
      const box = document.createElement("div");
      box.className = "day-box" + (d.toDateString() === today.toDateString() ? " today" : "");
      box.innerHTML = `<div class="day-name">יום ${HEBREW_DAYS[d.getDay()]}</div>
        <div class="day-date">${d.getDate()}</div>
        <div class="day-month">${HEBREW_MONTHS[d.getMonth()]}</div>`;
      grid.appendChild(box);
    });
  }

  // ── Quick items ───────────────────────────────────────────
  function subscribeQuick() {
    window._unsub2 = onSnapshot(query(quickCol, orderBy("name")), snap => {
      const items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderQuick(items);
    });
  }

  function renderQuick(items) {
    const container = document.getElementById("quick-chips");
    container.innerHTML = "";
    if (items.length === 0) {
      container.innerHTML = '<span class="quick-empty">הוסף מוצרים — הם יופיעו כאן לבחירה מהירה</span>';
      return;
    }
    items.forEach(item => {
      const chip = document.createElement("div");
      chip.className = "quick-chip";
      chip.innerHTML = `<span class="chip-name">${escHtml(item.name)}</span>
        <button class="chip-del" onclick="deleteQuick(event,'${item.id}')" title="הסר מהמהירים">✕</button>`;
      chip.addEventListener("click", e => {
        if (e.target.classList.contains("chip-del")) return;
        quickAddToList(item.name, chip);
      });
      container.appendChild(chip);
    });
  }

  window.deleteQuick = async function(e, id) {
    e.stopPropagation();
    await deleteDoc(doc(db, "quickItems", id));
  };

  async function quickAddToList(name, chipEl) {
    if (isDuplicate(name)) { showDuplicateMsg(chipEl); return; }
    await addDoc(itemsCol, { name, who: currentUser, done: false, ts: Date.now() });
  }

  async function ensureQuickItem(name) {
    const snap = await getDocs(quickCol);
    const exists = snap.docs.some(d => d.data().name.trim() === name.trim());
    if (!exists) await addDoc(quickCol, { name: name.trim(), ts: Date.now() });
  }

  // ── Shopping list ────────────────────────────────────────
  function subscribeList() {
    const dot = document.getElementById("sync-dot");
    const q   = query(itemsCol, orderBy("ts", "desc"));
    window._unsub1 = onSnapshot(q,
      snap => {
        dot.className = "sync-dot on";
        currentItems = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderList(currentItems);
      },
      err => { dot.className = "sync-dot"; console.error(err); }
    );
  }

  function renderList(items) {
    const ul = document.getElementById("shopping-list");
    ul.innerHTML = "";
    if (items.length === 0) {
      ul.innerHTML = '<div class="list-empty"><span>🛍️</span>הרשימה ריקה – הוסף פריטים!</div>';
      document.getElementById("list-count").textContent = "";
      return;
    }
    items.forEach(item => {
      const li = document.createElement("li");
      li.className = "list-item" + (item.done ? " done" : "");
      li.innerHTML = `
        <button class="check-btn" onclick="toggleDone('${item.id}',${item.done})">${item.done ? "✓" : ""}</button>
        <div class="item-info">
          <div class="item-name">${escHtml(item.name)}</div>
          ${item.who ? `<div class="item-who">ביקש/ה: ${escHtml(item.who)}</div>` : ""}
        </div>
        <button class="delete-btn" onclick="deleteItem('${item.id}')">✕</button>`;
      ul.appendChild(li);
    });
    const done = items.filter(i => i.done).length;
    document.getElementById("list-count").textContent = `${done}/${items.length} פריטים נקנו`;
  }

  // ── CRUD ─────────────────────────────────────────────────
  function showDuplicateMsg(el) {
    el.setCustomValidity("המוצר כבר ברשימה");
    el.reportValidity();
    setTimeout(() => el.setCustomValidity(""), 2500);
  }

  function isDuplicate(name) {
    return currentItems.some(i => !i.done && i.name.trim() === name.trim());
  }

  window.addItem = async function() {
    const nameEl = document.getElementById("item-input");
    const name   = nameEl.value.trim();
    if (!name) { nameEl.focus(); return; }
    if (isDuplicate(name)) { showDuplicateMsg(nameEl); return; }
    const btn = document.getElementById("add-btn");
    btn.disabled = true;
    try {
      await addDoc(itemsCol, { name, who: currentUser, done: false, ts: Date.now() });
      await ensureQuickItem(name);
      nameEl.value = "";
      nameEl.focus();
    } finally { btn.disabled = false; }
  };

  window.toggleDone = async function(id, current) {
    await updateDoc(doc(db, "shoppingItems", id), { done: !current });
  };

  window.deleteItem = async function(id) {
    await deleteDoc(doc(db, "shoppingItems", id));
  };

  window.clearDone = async function() {
    const snap = await getDocs(itemsCol);
    const batch = writeBatch(db);
    snap.docs.filter(d => d.data().done).forEach(d => batch.delete(d.ref));
    await batch.commit();
  };

  function escHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  document.getElementById("item-input")
    .addEventListener("keydown", e => { if (e.key === "Enter") window.addItem(); });

  // ── Init ─────────────────────────────────────────────────
  function init() {
    renderWeek();
    subscribeList();
    subscribeQuick();
  }
</script>
</body>
</html>
