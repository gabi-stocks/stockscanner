<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>רשימת קניות משפחתית</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      direction: rtl;
      text-align: right;
    }

    #login-screen {
      background: white;
      border-radius: 20px;
      padding: 50px 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
      width: 340px;
    }
    #login-screen h1 { font-size: 2rem; margin-bottom: 8px; color: #333; }
    #login-screen p  { color: #888; margin-bottom: 30px; font-size: 0.95rem; }
    .login-emoji { font-size: 3rem; margin-bottom: 12px; }

    #login-screen input {
      width: 100%; padding: 14px 18px;
      border: 2px solid #e0e0e0; border-radius: 12px;
      font-size: 1rem; outline: none;
      text-align: center; direction: ltr; letter-spacing: 3px;
      transition: border-color 0.2s;
    }
    #login-screen input:focus { border-color: #667eea; }

    #login-btn {
      width: 100%; margin-top: 16px; padding: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white; border: none; border-radius: 12px;
      font-size: 1rem; font-weight: 600; cursor: pointer;
    }
    #login-btn:hover { opacity: 0.9; }
    #login-error { color: #e74c3c; margin-top: 12px; font-size: 0.9rem; min-height: 20px; }

    #app { display: none; width: 100%; max-width: 700px; padding: 20px; }

    .header {
      background: white; border-radius: 20px; padding: 24px 28px;
      margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      display: flex; justify-content: space-between; align-items: center;
    }
    .header h1 { font-size: 1.5rem; color: #333; }
    .header p  { color: #888; font-size: 0.85rem; margin-top: 4px; }

    #logout-btn {
      padding: 8px 16px; background: #f0f0f0; border: none;
      border-radius: 10px; cursor: pointer; font-size: 0.85rem; color: #666;
    }
    #logout-btn:hover { background: #e0e0e0; }

    .week-card, .shopping-card {
      background: white; border-radius: 20px; padding: 24px 28px;
      margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    .week-card h2    { color: #555; font-size: 1rem; margin-bottom: 16px; font-weight: 600; }
    .shopping-card h2 { color: #333; font-size: 1.2rem; margin-bottom: 20px; }

    .days-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
    .day-box {
      background: #f7f8fc; border-radius: 14px; padding: 12px 8px;
      text-align: center; border: 2px solid transparent;
    }
    .day-box.today {
      background: linear-gradient(135deg, #667eea, #764ba2);
      box-shadow: 0 4px 15px rgba(102,126,234,0.4);
    }
    .day-name  { font-size: 0.8rem; font-weight: 700; color: #888; }
    .day-date  { font-size: 1.1rem; font-weight: 700; color: #333; margin-top: 4px; }
    .day-month { font-size: 0.72rem; color: #aaa; margin-top: 2px; }
    .day-box.today .day-name,
    .day-box.today .day-date,
    .day-box.today .day-month { color: white; }

    .add-form { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
    .add-form input {
      flex: 1; min-width: 120px; padding: 12px 16px;
      border: 2px solid #e0e0e0; border-radius: 12px;
      font-size: 0.95rem; outline: none;
      text-align: right; direction: rtl;
      transition: border-color 0.2s;
    }
    .add-form input:focus { border-color: #667eea; }
    .add-form input::placeholder { color: #bbb; }

    #add-btn {
      padding: 12px 22px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white; border: none; border-radius: 12px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer; white-space: nowrap;
    }
    #add-btn:hover { opacity: 0.9; }
    #add-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #shopping-list { list-style: none; }

    .list-empty { text-align: center; padding: 40px 20px; color: #ccc; font-size: 1rem; }
    .list-empty span { font-size: 2.5rem; display: block; margin-bottom: 10px; }

    .list-item {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px; border-radius: 14px; margin-bottom: 8px;
      background: #fafafa; border: 2px solid transparent;
      transition: all 0.2s; animation: slideIn 0.25s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .list-item:hover { border-color: #e8ecff; background: #f4f6ff; }
    .list-item.done  { opacity: 0.5; }
    .list-item.done .item-name { text-decoration: line-through; color: #aaa; }

    .check-btn {
      width: 28px; height: 28px; min-width: 28px;
      border-radius: 50%; border: 2.5px solid #667eea;
      background: white; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; color: white; transition: all 0.2s;
    }
    .list-item.done .check-btn { background: #667eea; border-color: #667eea; }

    .item-info { flex: 1; }
    .item-name { font-size: 1rem; color: #333; font-weight: 500; }
    .item-who  { font-size: 0.8rem; color: #999; margin-top: 2px; }

    .delete-btn {
      padding: 6px 12px; background: none; border: none;
      color: #ddd; font-size: 1.1rem; cursor: pointer;
      border-radius: 8px; transition: all 0.2s;
    }
    .delete-btn:hover { background: #fff0f0; color: #e74c3c; }

    .list-footer {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 16px; padding-top: 16px; border-top: 1px solid #f0f0f0;
    }
    .list-footer span { color: #aaa; font-size: 0.85rem; }

    #clear-done-btn {
      padding: 8px 14px; background: none; border: 1px solid #e0e0e0;
      border-radius: 10px; color: #999; font-size: 0.82rem;
      cursor: pointer; transition: all 0.2s;
    }
    #clear-done-btn:hover { background: #fff0f0; border-color: #e74c3c; color: #e74c3c; }

    .sync-indicator {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; background: #ccc; margin-left: 6px;
      vertical-align: middle; transition: background 0.3s;
    }
    .sync-indicator.connected { background: #2ecc71; }

    @media (max-width: 480px) {
      .days-grid { gap: 6px; }
      .day-box   { padding: 10px 4px; }
      .day-name  { font-size: 0.7rem; }
      .day-date  { font-size: 0.95rem; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-emoji">🏠</div>
  <h1>שלום משפחה!</h1>
  <p>הכנס סיסמה כדי להמשיך</p>
  <input type="password" id="password-input" placeholder="סיסמה" autocomplete="current-password">
  <button id="login-btn" onclick="login()">כניסה</button>
  <div id="login-error"></div>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <div>
      <h1>🛒 רשימת קניות משפחתית <span class="sync-indicator" id="sync-dot"></span></h1>
      <p id="week-label"></p>
    </div>
    <button id="logout-btn" onclick="logout()">יציאה</button>
  </div>

  <div class="week-card">
    <h2>📅 ימי השבוע</h2>
    <div class="days-grid" id="days-grid"></div>
  </div>

  <div class="shopping-card">
    <h2>📝 רשימת קניות</h2>
    <div class="add-form">
      <input type="text" id="item-input" placeholder="מה לקנות?" maxlength="80">
      <input type="text" id="who-input"  placeholder="מי ביקש?" maxlength="30">
      <button id="add-btn" onclick="addItem()">+ הוסף</button>
    </div>
    <ul id="shopping-list"></ul>
    <div class="list-footer">
      <span id="list-count"></span>
      <button id="clear-done-btn" onclick="clearDone()">מחק שנקנו ✓</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp }                          from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc,
           onSnapshot, doc, updateDoc,
           deleteDoc, query, orderBy, writeBatch }  from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // ── Firebase config ──────────────────────────────────────
  const firebaseConfig = {
    apiKey:            "AIzaSyAXw1rOkCevupn2Qp4Gw0GNr0gq-tCtFgQ",
    authDomain:        "familyshoppinglist-2c297.firebaseapp.com",
    projectId:         "familyshoppinglist-2c297",
    storageBucket:     "familyshoppinglist-2c297.firebasestorage.app",
    messagingSenderId: "489889558417",
    appId:             "1:489889558417:web:c9d9551699eeaf10bdb430",
    measurementId:     "G-6CLWZTE2EG"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  const col = collection(db, "shoppingItems");

  // ── Password ─────────────────────────────────────────────
  const PASSWORD = "family2024"; // ← שנה כאן

  // ── Hebrew labels ────────────────────────────────────────
  const HEBREW_DAYS   = ["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];
  const HEBREW_MONTHS = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני",
                          "יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];

  // ── Auth ─────────────────────────────────────────────────
  window.login = function() {
    const val = document.getElementById("password-input").value;
    if (val === PASSWORD) {
      sessionStorage.setItem("family_auth", "1");
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("app").style.display = "block";
      init();
    } else {
      document.getElementById("login-error").textContent = "סיסמה שגויה, נסה שוב";
      document.getElementById("password-input").value = "";
      document.getElementById("password-input").focus();
    }
  };

  window.logout = function() {
    sessionStorage.removeItem("family_auth");
    document.getElementById("app").style.display = "none";
    document.getElementById("login-screen").style.display = "block";
    document.getElementById("password-input").value = "";
    document.getElementById("login-error").textContent = "";
    if (window._unsubscribe) window._unsubscribe();
  };

  document.getElementById("password-input").addEventListener("keydown", e => {
    if (e.key === "Enter") window.login();
  });

  if (sessionStorage.getItem("family_auth") === "1") {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app").style.display = "block";
    init();
  }

  // ── Week display ─────────────────────────────────────────
  function renderWeek() {
    const today  = new Date();
    const sunday = new Date(today);
    sunday.setDate(today.getDate() - today.getDay());

    const days = [];
    for (let i = 0; i <= 4; i++) {
      const d = new Date(sunday);
      d.setDate(sunday.getDate() + i);
      days.push(d);
    }

    document.getElementById("week-label").textContent =
      `שבוע ${days[0].getDate()} ${HEBREW_MONTHS[days[0].getMonth()]} – ${days[4].getDate()} ${HEBREW_MONTHS[days[4].getMonth()]} ${days[4].getFullYear()}`;

    const grid = document.getElementById("days-grid");
    grid.innerHTML = "";
    days.forEach(d => {
      const box = document.createElement("div");
      box.className = "day-box" + (d.toDateString() === today.toDateString() ? " today" : "");
      box.innerHTML = `
        <div class="day-name">יום ${HEBREW_DAYS[d.getDay()]}</div>
        <div class="day-date">${d.getDate()}</div>
        <div class="day-month">${HEBREW_MONTHS[d.getMonth()]}</div>`;
      grid.appendChild(box);
    });
  }

  // ── Firestore real-time list ──────────────────────────────
  function subscribeList() {
    const dot = document.getElementById("sync-dot");
    const q   = query(col, orderBy("ts", "desc"));

    window._unsubscribe = onSnapshot(q,
      snapshot => {
        dot.className = "sync-indicator connected";
        const items = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        renderList(items);
      },
      err => {
        dot.className = "sync-indicator";
        console.error(err);
      }
    );
  }

  function renderList(items) {
    const ul = document.getElementById("shopping-list");
    ul.innerHTML = "";

    if (items.length === 0) {
      ul.innerHTML = '<div class="list-empty"><span>🛍️</span>הרשימה ריקה – הוסף פריטים!</div>';
      document.getElementById("list-count").textContent = "";
      return;
    }

    items.forEach(item => {
      const li = document.createElement("li");
      li.className = "list-item" + (item.done ? " done" : "");
      li.innerHTML = `
        <button class="check-btn" onclick="toggleDone('${item.id}', ${item.done})">${item.done ? "✓" : ""}</button>
        <div class="item-info">
          <div class="item-name">${escHtml(item.name)}</div>
          ${item.who ? `<div class="item-who">ביקש/ה: ${escHtml(item.who)}</div>` : ""}
        </div>
        <button class="delete-btn" onclick="deleteItem('${item.id}')">✕</button>`;
      ul.appendChild(li);
    });

    const done = items.filter(i => i.done).length;
    document.getElementById("list-count").textContent = `${done}/${items.length} פריטים נקנו`;
  }

  // ── CRUD ─────────────────────────────────────────────────
  window.addItem = async function() {
    const nameEl = document.getElementById("item-input");
    const whoEl  = document.getElementById("who-input");
    const name   = nameEl.value.trim();
    const who    = whoEl.value.trim();
    if (!name) { nameEl.focus(); return; }

    const btn = document.getElementById("add-btn");
    btn.disabled = true;
    try {
      await addDoc(col, { name, who, done: false, ts: Date.now() });
      nameEl.value = "";
      whoEl.value  = "";
      nameEl.focus();
    } finally {
      btn.disabled = false;
    }
  };

  window.toggleDone = async function(id, current) {
    await updateDoc(doc(db, "shoppingItems", id), { done: !current });
  };

  window.deleteItem = async function(id) {
    await deleteDoc(doc(db, "shoppingItems", id));
  };

  window.clearDone = async function() {
    const snapshot = await new Promise(res => {
      const unsub = onSnapshot(query(col), snap => { unsub(); res(snap); });
    });
    const batch = writeBatch(db);
    snapshot.docs.filter(d => d.data().done).forEach(d => batch.delete(d.ref));
    await batch.commit();
  };

  function escHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  document.getElementById("item-input").addEventListener("keydown", e => { if (e.key === "Enter") window.addItem(); });
  document.getElementById("who-input").addEventListener("keydown",  e => { if (e.key === "Enter") window.addItem(); });

  // ── Init ─────────────────────────────────────────────────
  function init() {
    renderWeek();
    subscribeList();
  }
</script>
</body>
</html>
